<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АвтоДиплом - симулятор написания диплома</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Кнопка темы слева -->
    <div class="theme-btn" id="themeButton" onclick="toggleTheme()" title="Сменить тему">☀️</div>

    <!-- Кнопка входа справа -->
    <div class="auth-btn" id="authButton" onclick="toggleAuth()" title="Войти">👤 <span id="authLabel">Войти</span></div>
    
    <!-- Модальное окно -->
    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <div class="modal-header">
                <span id="modalTitle">Вход</span>
                <button class="modal-close" onclick="toggleAuth()">✕</button>
            </div>
            <div class="modal-body" id="loginForm">
                <input type="text" id="loginNick" placeholder="Введите никнейм" maxlength="20">
                <input type="password" id="loginPass" placeholder="Пароль">
                <button onclick="login()">🚀 Войти</button>
                <p class="modal-switch">Нет аккаунта? <a onclick="showRegister()">Регистрация</a></p>
                <p class="modal-error" id="loginError"></p>
            </div>
            <div class="modal-body" id="registerForm" style="display:none;">
                <input type="text" id="regNick" placeholder="Придумайте никнейм" maxlength="20">
                <input type="password" id="regPass" placeholder="Придумайте пароль">
                <input type="password" id="regPass2" placeholder="Повторите пароль">
                <button onclick="register()">✨ Зарегистрироваться</button>
                <p class="modal-switch">Уже есть аккаунт? <a onclick="showLogin()">Войти</a></p>
                <p class="modal-error" id="regError"></p>
            </div>
            <div class="modal-body" id="profileInfo" style="display:none;">
                <p style="text-align:center; font-size:1.2em; color: inherit;">🎓 <span id="profileName"></span></p>
                <p style="text-align:center; color:#808080;">ID: <span id="profileId"></span></p>
                <button onclick="logout()">🚪 Выйти</button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <header>
            <h1>🎓 АвтоДиплом</h1>
            <p class="subtitle">Кликай, чтобы написать диплом!</p>
        </header>
        
        <div class="control-panel">
            <div class="mode-selector">
                <button onclick="setMode('slow')" id="btn-slow" class="active">🐢 Черепаха<br><small>1 слово</small></button>
                <button onclick="setMode('normal')" id="btn-normal" disabled>🔒 Нормально<br><small><span id="normal-progress">0/1000</span></small></button>
                <button onclick="setMode('panic')" id="btn-panic" disabled>🔒 Паника<br><small><span id="panic-progress">0/10000</span></small></button>
            </div>
            
            <div class="stats">
                <div class="stat-item"><span class="stat-label">Знаков:</span><span id="charCount">0</span></div>
                <div class="stat-item"><span class="stat-label">Страниц:</span><span id="pageCount">0</span></div>
                <div class="stat-item"><span class="stat-label">Кликов:</span><span id="totalClicks">0</span></div>
                <div class="stat-item"><span class="stat-label">Время:</span><span id="timer">00:00</span></div>
            </div>
            
            <div class="actions">
                <button id="btnToggle" onclick="toggleAutoclicker()">▶️ Запустить кликер</button>
                <button id="btnClick" onclick="clickWord()" disabled>🖱️ НАПИСАТЬ СЛОВО</button>
                <button onclick="resetProgress()">🔄 Сбросить</button>
                <button onclick="saveProgress()">💾 Сохранить</button>
            </div>
        </div>
        
        <div class="editor-container">
            <div class="editor-header">
                <button class="tab active">📄 Диплом</button>
                <button class="tab">📚 Источники</button>
                <button class="tab">
                    <span style="display: inline-flex; align-items: center; gap: 3px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" style="fill: #FF0000;">
                            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                        </svg>
                        YouTube
                    </span>
                </button>
                <button class="tab add-tab" title="Добавить вкладку">+</button>
            </div>
            <div class="editor-content" id="editor">
                <div class="cursor-blink">|</div>
                <div id="textContent" class="text-content"></div>
            </div>
            <div class="status-bar">
                <span id="currentAction">Ожидание запуска...</span>
                <span id="diplomaName">📄 Диплом 1/6: Бакалаврская работа</span>
                <span id="diplomaGoal">Цель: 50 стр</span>
                <span id="progress">0% готовности</span>
            </div>
        </div>
        
        <div class="notification" id="notification"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    const SB_URL = 'https://wfxwmegpoariokrrlpsz.supabase.co';
    const SB_KEY = 'sb_publishable_jzsje5DFfppFKSbmBJBBDQ_A_sO5rf7';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);
    
    let currentUser = null;
    
    function loadUser() {
        const saved = localStorage.getItem('diploma_user');
        if (saved) { currentUser = JSON.parse(saved); updateAuthUI(); }
    }
    
    function updateAuthUI() {
        const btn = document.getElementById('authButton');
        if (currentUser) {
            document.getElementById('authLabel').textContent = currentUser.player_name;
            btn.style.background = '#4ec9b0';
            btn.style.color = '#1e1e1e';
        } else {
            document.getElementById('authLabel').textContent = 'Войти';
            btn.style.background = '';
            btn.style.color = '';
        }
    }
    
    function toggleAuth() {
        const modal = document.getElementById('authModal');
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        if (modal.style.display === 'flex') {
            currentUser ? showProfile() : showLogin();
        }
    }
    
    function showLogin() {
        document.getElementById('modalTitle').textContent = 'Вход';
        document.getElementById('loginForm').style.display = 'flex';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('profileInfo').style.display = 'none';
        document.getElementById('loginError').textContent = '';
    }
    
    function showRegister() {
        document.getElementById('modalTitle').textContent = 'Регистрация';
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'flex';
        document.getElementById('profileInfo').style.display = 'none';
        document.getElementById('regError').textContent = '';
    }
    
    function showProfile() {
        document.getElementById('modalTitle').textContent = 'Профиль';
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('profileInfo').style.display = 'flex';
        document.getElementById('profileName').textContent = currentUser.player_name;
        document.getElementById('profileId').textContent = currentUser.user_id;
    }
    
    async function register() {
        const nick = document.getElementById('regNick').value.trim();
        const pass = document.getElementById('regPass').value;
        const pass2 = document.getElementById('regPass2').value;
        const error = document.getElementById('regError');
        error.textContent = '';
        if (!nick || !pass) { error.textContent = 'Заполните все поля'; return; }
        if (nick.length < 2) { error.textContent = 'Никнейм от 2 символов'; return; }
        if (pass.length < 3) { error.textContent = 'Пароль от 3 символов'; return; }
        if (pass !== pass2) { error.textContent = 'Пароли не совпадают'; return; }
        
        const userId = nick.toLowerCase().replace(/[^a-zа-я0-9]/g, '_') + '_' + Date.now().toString(36);
        const { data: existing } = await sb.from('diploma_progress').select('user_id').eq('player_name', nick).single();
        if (existing) { error.textContent = 'Никнейм занят'; return; }
        
        const { error: insertError } = await sb.from('diploma_progress').insert({
            user_id: userId, player_name: nick,
            state: { text: '', charCount: 0, timer: 0, mode: 'slow', totalClicks: 0, currentDiploma: 1 }
        });
        if (insertError) { error.textContent = 'Ошибка регистрации'; return; }
        
        currentUser = { user_id: userId, player_name: nick };
        localStorage.setItem('diploma_user', JSON.stringify(currentUser));
        updateAuthUI(); toggleAuth();
        showNotification('✨ Регистрация успешна!');
        if (autoclicker) autoclicker.reset();
    }
    
    async function login() {
        const nick = document.getElementById('loginNick').value.trim();
        const pass = document.getElementById('loginPass').value;
        const error = document.getElementById('loginError');
        error.textContent = '';
        if (!nick || !pass) { error.textContent = 'Заполните все поля'; return; }
        
        const { data, error: fetchError } = await sb.from('diploma_progress').select('*').eq('player_name', nick).single();
        if (fetchError || !data) { error.textContent = 'Пользователь не найден'; return; }
        
        currentUser = { user_id: data.user_id, player_name: data.player_name };
        localStorage.setItem('diploma_user', JSON.stringify(currentUser));
        updateAuthUI(); toggleAuth();
        showNotification('👋 С возвращением, ' + nick + '!');
        if (data.state && autoclicker) autoclicker.loadState(data.state);
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem('diploma_user');
        updateAuthUI(); toggleAuth();
        showNotification('🚪 Вы вышли');
        if (autoclicker) autoclicker.reset();
    }
    
    async function saveToSupabase(state) {
        if (!currentUser) { showNotification('⚠️ Войдите для сохранения!'); return false; }
        try {
            const { error } = await sb.from('diploma_progress').upsert({
                user_id: currentUser.user_id, player_name: currentUser.player_name,
                state: state, updated_at: new Date().toISOString()
            }, { onConflict: 'user_id' });
            if (error) { console.error(error); return false; }
            showNotification('💾 Сохранено!');
            return true;
        } catch (e) { return false; }
    }
    
    async function loadFromSupabase() {
        if (!currentUser) return null;
        try {
            const { data, error } = await sb.from('diploma_progress').select('state').eq('user_id', currentUser.user_id).single();
            if (error || !data) return null;
            showNotification('📂 Загружено!');
            return data.state;
        } catch (e) { return null; }
    }
    
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeButton');
        if (body.classList.contains('light-theme')) {
            body.classList.remove('light-theme');
            btn.textContent = '☀️';
            localStorage.setItem('theme', 'dark');
        } else {
            body.classList.add('light-theme');
            btn.textContent = '🌙';
            localStorage.setItem('theme', 'light');
        }
    }
    
    (function() {
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
            document.getElementById('themeButton').textContent = '🌙';
        }
    })();
    
    loadUser();
    </script>
    <script src="js/autoclicker.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
